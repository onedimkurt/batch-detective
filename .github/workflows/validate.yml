name: Validation Panel

on:
  push:
    tags:
      - "v*"          # Run on every release tag (v0.1.1, v0.2.0, etc.)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  validate:
    name: Run 6-dataset validation panel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install batch-detective and dependencies
        run: |
          pip install -e ".[dev]"

      - name: Cache validation data
        uses: actions/cache@v4
        with:
          path: validation_panel/
          key: validation-data-${{ hashFiles('tests/validation/run_validation_final.py') }}
          restore-keys: |
            validation-data-

      - name: Run validation panel
        run: |
          python tests/validation/run_validation_panel.py --verbose
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.ref_name }}
          path: |
            validation_panel/validation_panel_results.json
            validation_panel/validation_report.html
          retention-days: 90

      - name: Post summary to job
        if: always()
        run: |
          python - << 'EOF'
          import json, sys, os
          path = "validation_panel/validation_panel_results.json"
          if not os.path.exists(path):
              print("No results file found.")
              sys.exit(0)
          with open(path) as f:
              data = json.load(f)
          summary = data.get("summary", {})
          datasets = data.get("datasets", [])
          passed = summary.get("passed", sum(1 for d in datasets if d.get("passed")))
          total = summary.get("total", len(datasets))
          print(f"### Validation Panel: {passed}/{total} passed")
          print()
          print("| # | Result | ICC | Cramér's V | Dataset |")
          print("|---|--------|-----|------------|---------|")
          for d in datasets:
              ok = "✅ PASS" if d.get("passed") else "❌ FAIL"
              icc = d.get("batch_icc")
              icc_str = f"{icc:.3f}" if icc is not None else "N/A"
              cv = (d.get("cramers_v_batch_vs_chemical")
                    or d.get("cramers_v_batch_vs_genotype")
                    or d.get("cramers_v_batch_vs_treatment"))
              cv_str = f"{cv:.3f}" if cv is not None else "N/A"
              name = d.get("name","")[:50]
              print(f"| {d['test_id']} | {ok} | {icc_str} | {cv_str} | {name} |")
          EOF
