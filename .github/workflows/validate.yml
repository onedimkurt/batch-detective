name: Validation Panel

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  validate:
    name: Run 6-dataset validation panel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install batch-detective and dependencies
        run: pip install -e ".[dev]"

      - name: Cache validation data
        uses: actions/cache@v4
        with:
          path: validation_data/
          key: validation-data-v1-${{ hashFiles('tests/validation/run_all_validation.py') }}
          restore-keys: validation-data-v1-

      - name: Run validation panel
        run: python tests/validation/run_all_validation.py

      - name: Commit validation report to docs/
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p docs
          git add docs/validation_report.html
          git diff --cached --quiet || git commit -m "ci: update validation report [skip ci]"
          git push

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.ref_name }}
          path: docs/validation_report.html
          retention-days: 90
